name: Publish HTTP Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish-linux-artifacts:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_name: GenerateChartMcpServer-linux-x64-single-file
            publish_args: -r linux-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=true -p:IncludeNativeLibrariesForSelfExtract=true
          - artifact_name: GenerateChartMcpServer-linux-x64-self-contained
            publish_args: -r linux-x64 --self-contained true
          - artifact_name: GenerateChartMcpServer-linux-arm64-single-file
            publish_args: -r linux-arm64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=true -p:IncludeNativeLibrariesForSelfExtract=true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Publish ${{ matrix.artifact_name }}
        shell: bash
        run: |
          set -euo pipefail
          package_root="./artifacts/${{ matrix.artifact_name }}/GenerateChartMcpServer"
          mkdir -p "$package_root/images"
          dotnet publish ./GenerateChartMcpServer/GenerateChartMcpServer.csproj -c Release ${{ matrix.publish_args }} -o "$package_root"
          cp ./docs/GenerateChartMcpServer.service "$package_root/"
          cp ./docs/generatechartmcpserver.env.example "$package_root/"
          cp ./README.md "$package_root/README.md"
          tar -C "./artifacts/${{ matrix.artifact_name }}" -czf "./artifacts/${{ matrix.artifact_name }}.tar.gz" GenerateChartMcpServer

      - name: Upload ${{ matrix.artifact_name }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ./artifacts/${{ matrix.artifact_name }}.tar.gz

  publish-checksums:
    runs-on: ubuntu-latest
    needs: publish-linux-artifacts

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          pattern: GenerateChartMcpServer-linux-*
          path: ./artifacts
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd ./artifacts
          sha256sum ./*.tar.gz > SHA256SUMS.txt

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: GenerateChartMcpServer-checksums
          path: ./artifacts/SHA256SUMS.txt

  publish-release-assets:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - publish-linux-artifacts
      - publish-checksums

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          pattern: GenerateChartMcpServer-linux-*
          path: ./artifacts
          merge-multiple: true

      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          name: GenerateChartMcpServer-checksums
          path: ./artifacts

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/*.tar.gz
            ./artifacts/SHA256SUMS.txt

  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/generatechartmcpserver
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./GenerateChartMcpServer
          file: ./GenerateChartMcpServer/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}